name: Release Workflow

on:
  push:
    branches: [development, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: epam/ai-dial-ci/.github/workflows/node_release.yml@1280967b512e85ffc95fe6903a81eb9178f11966 # 2.4.1
    secrets: inherit
    with:
      node-version: 22
      platforms: "linux/amd64,linux/arm64"
