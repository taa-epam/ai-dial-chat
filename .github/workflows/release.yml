name: Release Workflow

on:
  push:
    branches: [development, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: taa-epam/ai-dial-ci/.github/workflows/node_release.yml@f35b17df28f9a32ea75e80c8449e6dc3a7f75aa1
    secrets: inherit
    with:
      node-version: 22
      platforms: "linux/amd64,linux/arm64"
      maximize-build-space: true
      dockerhub-image-name: ltaa/ai-dial-chat