name: Release Workflow

on:
  push:
    branches: [development, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: taa-epam/ai-dial-ci/.github/workflows/node_release.yml@8609c040b96c0d9d4ac99b60e2f605d1e215a95f
    secrets: inherit
    with:
      node-version: 22
      platforms: "linux/amd64,linux/arm64"
      maximize-build-space: true
      dockerhub-image-name: ltaa/ai-dial-chat