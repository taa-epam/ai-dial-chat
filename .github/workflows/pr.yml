name: PR Workflow

on:
  pull_request:
    branches: [development, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run_tests:
    uses: taa-epam/ai-dial-ci/.github/workflows/node_pr.yml@1280967b512e85ffc95fe6903a81eb9178f11966 #2.4.1
    secrets: inherit
    with:
      node-version: 22
      platforms: "linux/amd64,linux/arm64"